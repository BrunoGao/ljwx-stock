name: build-and-enqueue

on:
  push:
    branches: [master]
    paths:
      - 'qlib_predict/**'
      - '.github/workflows/build-and-enqueue.yml'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'deploy environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Run qlib_predict tests
        run: |
          uv run --with-requirements qlib_predict/requirements.txt python -m pytest -q qlib_predict/tests

  build:
    if: github.event_name != 'pull_request'
    needs: [test]
    uses: BrunoGaoSZ/ljwx-workflow-templates/.github/workflows/build-ghcr.yml@main
    with:
      image_name: ljwx-stock-qlib-predict
      context: qlib_predict
      dockerfile: qlib_predict/Dockerfile
      platforms: linux/amd64
      push_latest: false
    secrets: inherit

  enqueue:
    if: github.event_name != 'pull_request'
    needs: [build]
    uses: BrunoGaoSZ/ljwx-workflow-templates/.github/workflows/enqueue-release.yml@main
    with:
      service: ljwx-stock-qlib-predict
      env: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || 'dev' }}
      ghcr_ref: ${{ needs.build.outputs.ghcr_ref }}
      tag: ${{ needs.build.outputs.tag }}
      source_git_sha: ${{ github.sha }}
      deploy_repo: BrunoGaoSZ/ljwx-deploy
      deploy_ref: main
      queue_file: release/queue.yaml
      open_pr: true
      auto_merge_pr: true
      merge_method: merge
      pr_title_prefix: queue
    secrets:
      deploy_repo_token: ${{ secrets.DEPLOY_REPO_TOKEN }}
