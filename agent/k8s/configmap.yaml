apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-agent-config
data:
  LOG_LEVEL: "INFO"
  RATE_LIMIT_RPM: "30"
  MAX_TOKENS_PER_RUN: "50000"
  METRICS_ENABLED: "true"
  QC_ENABLED: "true"
  QC_LOOKBACK_DAYS: "20"
  QC_COLD_START_MIN: "5"
  QC_OVERLAP_ERROR_THRESHOLD: "1.0"
  QC_OVERLAP_WARN_THRESHOLD: "0.9"
