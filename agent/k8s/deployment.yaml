apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-agent
  template:
    metadata:
      labels:
        app: stock-agent
    spec:
      containers:
        - name: stock-agent
          image: ljwx-stock-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secret
                  key: DATABASE_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secret
                  key: API_KEY
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: LOG_LEVEL
            - name: RATE_LIMIT_RPM
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: RATE_LIMIT_RPM
            - name: MAX_TOKENS_PER_RUN
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: MAX_TOKENS_PER_RUN
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
